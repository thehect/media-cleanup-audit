services:
  mediacleanup:
    build: .
    container_name: mediacleanup
    hostname: MEDIACLEANUP
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./reports:/reports
      - /mnt/Movies:/data/movies:ro
      - /mnt/TvShows:/data/tvshows:ro
      - /mnt/Anime:/data/anime:ro
      - /mnt/downloads:/data/downloads:ro
    ports:
      - "6996:6996"
    networks:
      - default
      - media_stack
    environment:
      JELLYFIN_API_KEY: change-me
      RADARR_API_KEY: change-me
      SONARR_API_KEY: change-me
      QBIT_USER: admin
      QBIT_PASS: change-me
    command: ["--serve", "--config", "/app/config.yml", "--output-dir", "/reports", "--port", "6996"]

networks:
  media_stack:
    external: true
    name: proxy_network
