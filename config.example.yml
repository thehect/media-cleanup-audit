media_roots:
  movies: /data/movies
  tv: /data/tvshows
  downloads: /data/downloads
  erase_later: /data/_erase_later

# Fast local quarantine is on by default. Files are placed in a hidden
# .mediacleanup-quarantine folder beside their current library, so the NAS can
# rename them without copying the entire video first. Do not disable this when
# the dashboard runs on a separate server from your storage.
quarantine:
  local_fast_path: true

# Optional single-password lock for the web dashboard. Keep the actual value
# in .env as DASHBOARD_PASSWORD, never in this file or in Git.
dashboard:
  password: ${DASHBOARD_PASSWORD}

# Optional aliases for stacks where apps see the same folders at different paths.
# Example:
# path_mappings:
#   - from: /movies
#     to: /data/movies
path_mappings:
  - from: /movies
    to: /data/movies
  - from: /tvshows
    to: /data/tvshows
  - from: /anime
    to: /data/anime
  - from: /downloads
    to: /data/downloads

scan:
  roots:
    - /data/movies
    - /data/tvshows
    - /data/anime
    - /data/downloads
  video_extensions:
    - .mkv
    - .mp4
    - .m4v
    - .avi
    - .mov
    - .wmv
    - .ts
    - .m2ts
    - .mpg
    - .mpeg
    - .webm
  ignore_path_keywords:
    - sample
    - trailer
    - extras
    - behind the scenes
    - featurettes

jellyfin:
  enabled: true
  url: http://jellyfin:8096
  api_key: ${JELLYFIN_API_KEY}
  # Optional. If omitted, the first enabled Jellyfin user is used.
  user_id:

radarr:
  enabled: true
  url: http://radarr:7878
  api_key: ${RADARR_API_KEY}

sonarr:
  enabled: true
  url: http://sonarr:8989
  api_key: ${SONARR_API_KEY}

qbittorrent:
  enabled: true
  url: http://qbittorrent:8080
  username: ${QBIT_USER}
  password: ${QBIT_PASS}
