media_roots:
  movies: /data/movies
  tv: /data/tvshows
  downloads: /data/downloads
  erase_later: /data/_erase_later

# Optional aliases for stacks where apps see the same folders at different paths.
# Example:
# path_mappings:
#   - from: /movies
#     to: /data/movies
path_mappings:
  - from: /movies
    to: /data/movies
  - from: /tvshows
    to: /data/tvshows
  - from: /anime
    to: /data/anime
  - from: /downloads
    to: /data/downloads

scan:
  roots:
    - /data/movies
    - /data/tvshows
    - /data/anime
    - /data/downloads
  video_extensions:
    - .mkv
    - .mp4
    - .m4v
    - .avi
    - .mov
    - .wmv
    - .ts
    - .m2ts
    - .mpg
    - .mpeg
    - .webm
  ignore_path_keywords:
    - sample
    - trailer
    - extras
    - behind the scenes
    - featurettes

jellyfin:
  enabled: true
  url: http://jellyfin:8096
  api_key: ${JELLYFIN_API_KEY}
  # Optional. If omitted, the first enabled Jellyfin user is used.
  user_id:

radarr:
  enabled: true
  url: http://radarr:7878
  api_key: ${RADARR_API_KEY}

sonarr:
  enabled: true
  url: http://sonarr:8989
  api_key: ${SONARR_API_KEY}

qbittorrent:
  enabled: true
  url: http://qbittorrent:8080
  username: ${QBIT_USER}
  password: ${QBIT_PASS}
