services:
  mediacleanup:
    build: .
    container_name: mediacleanup
    hostname: MEDIACLEANUP
    restart: unless-stopped
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./reports:/reports
      - ${QUARANTINE_ROOT:-./quarantine}:/data/_erase_later
      - ${MOVIES_ROOT:-/mnt/Movies}:/data/movies:${MEDIA_MOUNT_MODE:-ro}
      - ${TVSHOWS_ROOT:-/mnt/TvShows}:/data/tvshows:${MEDIA_MOUNT_MODE:-ro}
      - ${ANIME_ROOT:-/mnt/Anime}:/data/anime:${MEDIA_MOUNT_MODE:-ro}
      - ${DOWNLOADS_ROOT:-/mnt/downloads}:/data/downloads:${MEDIA_MOUNT_MODE:-ro}
    ports:
      - "${MEDIACLEANUP_PORT:-6996}:6996"
    networks:
      - default
      - media_stack
    environment:
      JELLYFIN_API_KEY: ${JELLYFIN_API_KEY:-}
      RADARR_API_KEY: ${RADARR_API_KEY:-}
      SONARR_API_KEY: ${SONARR_API_KEY:-}
      QBIT_USER: ${QBIT_USER:-}
      QBIT_PASS: ${QBIT_PASS:-}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
    command: ["--serve", "--config", "/app/config.yml", "--output-dir", "/reports", "--port", "6996"]

networks:
  media_stack:
    external: true
    name: ${MEDIA_NETWORK:-proxy_network}
